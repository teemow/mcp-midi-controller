---
name: Auto Release
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto_release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install CGO build dependencies (ALSA + arm64 cross toolchain)
        run: |
          set -euo pipefail
          sudo dpkg --add-architecture arm64
          # Restrict the default (amd64) repos and add arm64 from ports.ubuntu.com.
          sudo sed -i 's/^Architectures:.*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
          sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null <<EOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports/
          Suites: ${CODENAME} ${CODENAME}-updates ${CODENAME}-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev libasound2-dev:arm64

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: --version

      - name: Configure Git
        env:
          GH_ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$GH_ACTOR"
          git config user.email "${GH_ACTOR}@users.noreply.github.com"

      - name: Determine Next Version
        id: version
        run: |
          set -e
          LATEST_VERSION=$(./scripts/get-latest-version.sh)
          IFS='.' read -r -a VERSION_PARTS <<< "$LATEST_VERSION"
          NEXT_PATCH=$((VERSION_PARTS[2] + 1))
          NEXT_VERSION="v${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$NEXT_PATCH"
          echo "Latest version: $LATEST_VERSION"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Tag
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          if git rev-parse "$NEXT_VERSION" >/dev/null 2>&1; then
            echo "Tag $NEXT_VERSION already exists, skipping tag creation"
            exit 1
          fi
          git tag "$NEXT_VERSION"
          git push origin "$NEXT_VERSION"
          echo "Created and pushed tag $NEXT_VERSION"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
