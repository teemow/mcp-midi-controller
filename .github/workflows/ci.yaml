---
name: CI
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install ALSA headers (CGO USB-MIDI driver)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Build web UI (signalwave SPA)
        run: |
          set -euo pipefail
          cd web
          npm ci
          npm run build

      - name: Verify committed embed dir is up to date
        run: |
          set -euo pipefail
          if ! git diff --quiet -- internal/webui/dist; then
            echo "internal/webui/dist is out of date — run 'make web' and commit the result."
            git --no-pager diff --stat -- internal/webui/dist
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Print coverage
        run: go tool cover -func=coverage.out
