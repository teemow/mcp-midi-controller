# ---------------------------------------------------------------------------
# FlatBuffers model tables (the document/state model carried over TRPC). Native
# C++ types end in `T`; the wire is FlatBuffers. No reflection schema (.bfbs) is
# embedded — these are the compiled-in tables, recovered from RTTI + JSON keys.
# ---------------------------------------------------------------------------
model_tables:
  exported_documents:        # trpc::models::*  (host-side export units)
    - ExportedProgram        # *.pgm90
    - ExportedPreset         # *.preset90
    - ExportedProgramList    # *.lst90
    - ExportedAlgorithm      # *.alg90
    - ExportedDeviceState    # full device backup
  device_state:
    - ProgramDatabase
    - DeviceState
    - DeviceInfo
    - DeviceInfoList
    - SystemSettings
    - Routing
    - SoftwareComponent
  programs_presets:
    - Program
    - ProgramDetail
    - ProgramSummary
    - PreviewedProgramSummary
    - ProgramList
    - ProgramListArray
    - ProgramLibrary
    - ProgramNotes
    - ProgramPreview
    - ProgramCache
    - ListMetadata
    - Preset
    - PresetLibrary
    - PresetSummary
    - PresetListArray
    - PresetSlots
  parameters:
    - Parameter
    - ParameterArray
    - ParameterPair
    - ParameterValueArray
    - ParameterSubscriptionArray
    - ControllerSubscription
    - DiscardParameter
  hardware:
    - Footswitch
    - FootswitchArray
    - QuickKnob
    - QuickKnobArray
    - Favorite
    - Favorites
    - BankArray
    - AlgorithmSummary
    - AlgorithmArray

# Per-parameter / per-program model fields (ProgramDetailModel / ParameterModel
# JSON keys) — useful when decoding a captured flatbuffer.
model_fields:
  parameter:
    - numericId
    - label
    - description
    - value
    - postValue
    - minimumValue
    - maximumValue
    - defaultValue
    - resolution
    - numValues
    - choices
    - pretaperMin
    - pretaperMax
    - isAutomatable
    - isModified
    - userObjectId
    - controlSourceIndex
    - controlSourceType
    - controlSourceMask
    - controllerSubscriptionPmin
    - controllerSubscriptionPmax
    - controllerSubscriptionCmin
    - controllerSubscriptionCmax
    - controllerActionExtraction
    - controllerActionTransformation
  program:
    - serialNo
    - deviceId
    - listIndex
    - effectType
    - author
    - notes
    - version
    - minClientVersion
    - isFactory
    - isDualMode
    - routing
    - insertOption1
    - favoriteType
    - modifiedProgramListIndex

# ---------------------------------------------------------------------------
# TRPC operations (RPC methods recovered from RTTI). WRITE ops are flagged; the
# daemon must NEVER issue these during research. Listed for the eventual
# verify_control read path only.
# ---------------------------------------------------------------------------
operations:
  reads:
    - getSystemParameters          # "SystemParametersResponse flatbuffer size:"
    - loadExportedAlgorithm
    - importProgram                # host->device staging (loads into edit buffer)
    - importPreset
    - importProgramList
    - importH9Preset
    - importH9ZPreset
  writes_do_not_issue:
    - changePresetParameter        # (int index, ValuePair) — live parameter edit
    - loadDeviceBackup             # (ExportedDeviceState) — full restore
    - restoreDevice
    - backupDevice
    - factoryReset
    - rebootInUpdateMode
  system_test:                     # SystemTestView message kinds (safe diagnostics)
    - SystemParameters
    - TestLoopback
    - TestBytes

# ---------------------------------------------------------------------------
# Files H90 Control reads/writes on the host (formats; internal layout = the
# flatbuffer tables above).
# ---------------------------------------------------------------------------
host_files:
  ".pgm90":    "single Program (a pair of presets + routing)"
  ".lst90":    "Program List / Playlist (up to 99 Programs)"
  ".preset90": "single Preset"
  ".alg90":    "exported Algorithm"
  ".h9z / .h9 / .tide": "legacy H9 import formats"
