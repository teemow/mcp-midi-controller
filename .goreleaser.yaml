---
version: 2

before:
  hooks:
    # The central release-go.yml runner is generic; repo-specific CGO
    # cross-compile deps (ALSA + arm64 toolchain) are installed here.
    - sh -c "./scripts/install-cross-deps.sh"
    - go mod tidy
    # Build the signalwave SPA into internal/webui/dist (go:embed) before the Go
    # builds. Pure Node, so it works under the per-arch CGO toolchains below.
    - sh -c "cd web && npm ci && npm run build"

builds:
  - id: mcp-midi-controller
    main: ./cmd/mcp-midi-controller
    binary: mcp-midi-controller
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      # gomidi's rtmidi driver needs CGO + ALSA, so the USB path links C.
      # The BLE/OSC paths stay pure-Go. Cross-compiling arm64 from the amd64
      # runner requires a per-arch C toolchain and ALSA pkg-config.
      - CGO_ENABLED=1
      - 'CC={{- if eq .Arch "arm64" }}aarch64-linux-gnu-gcc{{- else }}gcc{{- end }}'
      # rtmidi is C++: cgo links its objects with CXX, which must also be the
      # cross compiler or the arm64 link fails with "Relocations in generic ELF".
      - 'CXX={{- if eq .Arch "arm64" }}aarch64-linux-gnu-g++{{- else }}g++{{- end }}'
      - 'PKG_CONFIG_PATH={{- if eq .Arch "arm64" }}/usr/lib/aarch64-linux-gnu/pkgconfig{{- else }}/usr/lib/x86_64-linux-gnu/pkgconfig{{- end }}'
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    wrap_in_directory: true
    files:
      - none*

checksum:
  algorithm: sha256
  name_template: '{{ .ProjectName }}_checksums.txt'

changelog:
  use: github-native

release:
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  extra_files:
    - glob: ./dist/mcp-midi-controller_linux_amd64*/mcp-midi-controller
      name_template: mcp-midi-controller_linux_amd64
    - glob: ./dist/mcp-midi-controller_linux_arm64*/mcp-midi-controller
      name_template: mcp-midi-controller_linux_arm64
