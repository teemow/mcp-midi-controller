id: aum
name: AUM (iPad host)
manufacturer: Kymatica
description: >
  AUM mixer/host on the iPad, reached over BLE-MIDI (its WIDI dongle). AUM has no
  fixed factory CC map: its "MIDI Control" system lets you assign any incoming CC/
  NOTE/PC/PBEND/CHPRS message to a parameter via MIDI learn, so the CC numbers
  below are a CONVENTION this server owns — they are NOT documented AUM defaults.
  To use this definition, mirror the same CC numbers into AUM's MIDI Control matrix
  (each channel's "Channel Controls" collection for level/mute/solo/rec/scroll, a
  Stereo Balance node for pan, a Bus Send node for sends, and the Transport
  "Simple MIDI control" items) on the MIDI channel this device is bound to.
  Generate a cheat-sheet from this file to make the AUM-side setup mechanical.

  This definition covers AUM's full mappable host surface: per-channel
  level/mute/solo/rec/scroll + pan + a bus send (channels 1-8), the global
  transport (toggle/start/stop/rewind/prev-bar/next-bar/toggle-record/tap-tempo/
  tempo/metronome), system actions (unsolo/hide-plugins/switch-to-AUM), Session
  Load and Preset Load (via Program Change), and an alternative transport path
  over MIDI Machine Control SysEx (AUM "Receive MMC").

  AUM CC is 7-bit only (no NRPN; 14-bit is available solely via Pitch Bend, which
  this convention does not use). See: https://kymatica.com/aum/help
transport: blemidi
settle_ms: 0
# --- Convention CC map (mirror these into AUM's MIDI Control / learn) ---
# All CCs ride the MIDI channel supplied by the binding. Numbers sit in MIDI's
# general-purpose/undefined CC range to avoid clashing with common controllers.
#
#   transport (toggle play) -> CC 20
#
#   Per-channel mixer block (channel N = 1..8), interleaved stride 3:
#     mute  = 18 + 3*N   (ch1=21 ch2=24 ch3=27 ch4=30 ch5=33 ch6=36 ch7=39 ch8=42)
#     level = 19 + 3*N   (ch1=22 ch2=25 ch3=28 ch4=31 ch5=34 ch6=37 ch7=40 ch8=43)
#     pan   = 20 + 3*N   (ch1=23 ch2=26 ch3=29 ch4=32 ch5=35 ch6=38 ch7=41 ch8=44)
#
#   Per-channel parallel blocks (channel N = 1..8):
#     solo   = 44 + N    (45..52)
#     rec    = 52 + N    (53..60)
#     scroll = 60 + N    (61..68)
#     send1  = 68 + N    (69..76)   first Bus Send node on the channel
#
#   Transport / system block (undefined CC range):
#     102 transport_start        103 transport_stop      104 transport_rewind
#     105 transport_toggle_record 106 transport_prev_bar 107 transport_next_bar
#     108 tap_tempo              109 tempo               110 metronome
#     111 unsolo_all            112 hide_plugins         113 switch_to_aum
#
#   Session Load / Preset Load -> Program Change (the server sends PC first in a
#   scene recall; in AUM add Session Load / Preset Load actions and map each to a
#   distinct PC number). Both are PC: if you map both on the SAME bound channel
#   AUM will fire both on a matching PC — bind them on separate channels (or use
#   the per-plugin auv3 preset workflow) to keep them independent.
#
#   MMC over SysEx (channel-less; needs AUM Transport "Receive MMC" enabled):
#     mmc_play/stop/pause/rewind/record -> F0 7F 7F 06 <cmd> F7 (dev 7F = all-call)
controls:
  # --- Global transport: single toggle (kept for back-compat) ---
  - name: transport
    description: >
      Start/stop AUM's global transport. Convention CC — in AUM map this to the
      Transport "Toggle play" simple control. Note: AUM Triggers fire on non-zero
      only, so a 0 value will not stop unless you instead map the deterministic
      transport_start / transport_stop controls below.
    type: cc
    cc: 20
    value: { type: enum, values: { stop: 0, start: 127 } }

  # --- Channel 1 ---
  - name: ch1_mute
    description: Channel 1 mute (convention CC — AUM "Channel Controls" Mute toggle, Cycle off so >64 = muted).
    type: cc
    cc: 21
    value: { type: enum, values: { unmute: 0, mute: 127 } }
  - name: ch1_level
    description: Channel 1 level fader (convention CC — AUM "Channel Controls" Volume).
    type: cc
    cc: 22
    value: { type: range, min: 0, max: 127 }
  - name: ch1_pan
    description: >
      Channel 1 pan (convention CC). AUM channel strips have no native pan; map
      this to a Stereo Balance/Panning node's knob on the channel. 64 = center.
    type: cc
    cc: 23
    value: { type: range, min: 0, max: 127 }
  - name: ch1_solo
    description: Channel 1 solo (convention CC — AUM "Channel Controls" Solo toggle, Cycle off so >64 = soloed).
    type: cc
    cc: 45
    value: { type: enum, values: { unsolo: 0, solo: 127 } }
  - name: ch1_rec
    description: Channel 1 record-enable (convention CC — AUM "Channel Controls" Rec toggle, Cycle off so >64 = armed).
    type: cc
    cc: 53
    value: { type: enum, values: { disarm: 0, arm: 127 } }
  - name: ch1_scroll
    description: Channel 1 "Scroll to this channel" trigger (convention CC — fires on non-zero).
    type: cc
    cc: 61
    value: { type: enum, values: { trigger: 127 } }
  - name: ch1_send1
    description: >
      Channel 1 first Bus Send amount (convention CC). AUM sends are a "Bus Send"
      node in an effect slot; map this to that node's send-amount knob.
    type: cc
    cc: 69
    value: { type: range, min: 0, max: 127 }

