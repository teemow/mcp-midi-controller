  # --- Global transport: deterministic "Simple MIDI control" items ---
  # (AUM Transport > Simple MIDI control). Triggers fire on non-zero, so each
  # carries a single {trigger:127}. Use these instead of the toggle when you need
  # a known end-state (e.g. transport_stop always stops/rewinds).
  - name: transport_start
    description: Start play (Transport "Start play" simple control). Triggers on non-zero.
    type: cc
    cc: 102
    value: { type: enum, values: { trigger: 127 } }
  - name: transport_stop
    description: Stop/rewind (Transport "Stop/rewind" simple control). Triggers on non-zero. Also rewinds if already stopped.
    type: cc
    cc: 103
    value: { type: enum, values: { trigger: 127 } }
  - name: transport_rewind
    description: Rewind (Transport "Rewind" simple control). Triggers on non-zero.
    type: cc
    cc: 104
    value: { type: enum, values: { trigger: 127 } }
  - name: transport_toggle_record
    description: Toggle record (Transport "Toggle record" simple control). Triggers on non-zero.
    type: cc
    cc: 105
    value: { type: enum, values: { trigger: 127 } }
  - name: transport_prev_bar
    description: Previous bar (Transport "Previous bar" simple control). Triggers on non-zero.
    type: cc
    cc: 106
    value: { type: enum, values: { trigger: 127 } }
  - name: transport_next_bar
    description: Next bar (Transport "Next bar" simple control). Triggers on non-zero.
    type: cc
    cc: 107
    value: { type: enum, values: { trigger: 127 } }
  - name: tap_tempo
    description: Tap tempo (Transport "Tap tempo" simple control). Triggers on non-zero; tap repeatedly to set the tempo.
    type: cc
    cc: 108
    value: { type: enum, values: { trigger: 127 } }
  - name: tempo
    description: >
      Set tempo (Transport "Tempo" simple Value control). The 0-127 CC maps onto
      whatever BPM input range you configure for this control in AUM (its "0 ->
      100%" range), so set that range to the tempo span you want to sweep.
    type: cc
    cc: 109
    value: { type: range, min: 0, max: 127 }
  - name: metronome
    description: Metronome on/off (Transport "Metronome on/off" simple Toggle). Cycle off so >64 = on.
    type: cc
    cc: 110
    value: { type: enum, values: { off: 0, on: 127 } }

  # --- System actions (MIDI Control > System actions) ---
  - name: unsolo_all
    description: Unsolo all audio channel strips (System action "Unsolo Channels"). Triggers on non-zero.
    type: cc
    cc: 111
    value: { type: enum, values: { trigger: 127 } }
  - name: hide_plugins
    description: Hide/Unhide all plugin windows (System action "Hide/Unhide Plugins", a toggle). Triggers on non-zero.
    type: cc
    cc: 112
    value: { type: enum, values: { trigger: 127 } }
  - name: switch_to_aum
    description: >
      Switch AUM to the foreground (System action "Switch to AUM"). Triggers on
      non-zero. AUM must be running in the background to respond.
    type: cc
    cc: 113
    value: { type: enum, values: { trigger: 127 } }

  # --- Session / Preset load via Program Change ---
  # Both are Program Change. AUM's Session Load / Preset Load collections are
  # dynamic: add one action per session/preset and map each to a distinct PC
  # number. The scene engine sends PC before CC, so these recall first. Mapping
  # BOTH on the same bound MIDI channel makes a single PC fire both — bind them on
  # separate channels (or use the per-plugin auv3 preset workflow) to keep them
  # independent.
  - name: session_load
    description: >
      Load a saved AUM session by number via Program Change (MIDI Control "Session
      Load" actions; saved globally, not per-session). In AUM add a Session Load
      action per session and set each to trigger on the matching PC number.
    type: program_change
    value: { type: range, min: 0, max: 127 }
  - name: preset_load
    description: >
      Load a plugin preset by number via Program Change (a plugin node's built-in
      "Preset Load" actions). Add a Preset Load action per preset in AUM and map
      each to the matching PC number. See the per-plugin auv3 probe workflow for
      param-accurate preset definitions; keep this on a different MIDI channel
      than session_load to avoid a single PC triggering both.
    type: program_change
    value: { type: range, min: 0, max: 127 }

  # --- Alternative transport path: MIDI Machine Control over SysEx ---
  # Requires AUM Transport > "Receive MMC" enabled. These are channel-less SysEx
  # (no binding channel applies). Device id 7F = all-call (every device). AUM
  # reacts to: Play 0x02, Stop 0x01, Pause 0x09, Rewind 0x05, Record 0x06,
  # Goto/Locate 0x44 (locate needs a target time, so it is not exposed here).
  - name: mmc_play
    description: MMC Play (SysEx F0 7F 7F 06 02 F7). Alternative to transport_start; needs AUM "Receive MMC".
    type: sysex
    sysex: "F0 7F 7F 06 02 F7"
    value: { type: enum, values: { trigger: 127 } }
  - name: mmc_stop
    description: MMC Stop (SysEx F0 7F 7F 06 01 F7). Also rewinds if already stopped. Needs AUM "Receive MMC".
    type: sysex
    sysex: "F0 7F 7F 06 01 F7"
    value: { type: enum, values: { trigger: 127 } }
  - name: mmc_pause
    description: MMC Pause (SysEx F0 7F 7F 06 09 F7). Needs AUM "Receive MMC".
    type: sysex
    sysex: "F0 7F 7F 06 09 F7"
    value: { type: enum, values: { trigger: 127 } }
  - name: mmc_rewind
    description: MMC Rewind (SysEx F0 7F 7F 06 05 F7). Needs AUM "Receive MMC".
    type: sysex
    sysex: "F0 7F 7F 06 05 F7"
    value: { type: enum, values: { trigger: 127 } }
  - name: mmc_record
    description: MMC Record (SysEx F0 7F 7F 06 06 F7). Needs AUM "Receive MMC".
    type: sysex
    sysex: "F0 7F 7F 06 06 F7"
    value: { type: enum, values: { trigger: 127 } }
